<section class="auth-page">
  <div class="auth-card">
    <p class="badge">✨ Create account</p>
    <h1>Register on InternLink</h1>
    <p class="subtitle">Create your student account and start applying.</p>

    <div class="grid-2">
      <div class="form-group">
        <label>First name</label>
        <input [(ngModel)]="first_name" type="text" placeholder="First name" />
      </div>

      <div class="form-group">
        <label>Last name</label>
        <input [(ngModel)]="last_name" type="text" placeholder="Last name" />
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" placeholder="Choose username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="Enter email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter password" />
    </div>

    <div class="form-group">
      <label>Confirm password</label>
      <input [(ngModel)]="password2" type="password" placeholder="Repeat password" />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button (click)="onSubmit()" [disabled]="loading">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <p class="switch-text">
      Already have account? <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
