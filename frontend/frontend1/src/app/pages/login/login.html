<section class="auth-page">
  <div class="auth-card">
    <p class="badge">🔐 Welcome back</p>
    <h1>Login to InternLink</h1>
    <p class="subtitle">Use your username and password to enter your account.</p>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" placeholder="Enter username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter password" />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button (click)="onSubmit()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="switch-text">
      No account? <a routerLink="/register">Register</a>
    </p>
  </div>
</section>
